name: CI

# The connector's own gates: lint, format, types, and the test-suite (driven
# against a fake client — no live backend API). Mirrors rac-core's conventions.

on:
  push:
    branches: [main]
  pull_request:
  # Reusable: the release workflow calls this so a publish is gated on the
  # same lint + test suite that guards every push and PR.
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # setuptools-scm derives the version from git tags; fetch them so the
          # editable install can resolve a version.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: ruff check
        run: python -m ruff check src/ tests/

      - name: ruff format --check
        run: python -m ruff format --check src/ tests/

      - name: mypy
        run: python -m mypy src/

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q
