name: Upload Python Package

# Publish rac-connectors to PyPI when a GitHub Release is published. The
# trigger is the Release, not a tag pattern, so the tag name carries no `v`
# requirement. Versioning is tag-driven (setuptools-scm) and CalVer (ADR-008):
# tag YYYY.M.<minor> (e.g. 2026.6.1), publish the release, and the build is
# that version. Mirrors rac-core's release flow.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  ci:
    # Gate the release on the full lint + test suite (reusable CI workflow).
    # Nothing is built or published unless it passes.
    uses: ./.github/workflows/ci.yml

  release-build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # setuptools-scm derives the version from git tags, so fetch the full
          # history + tags (the default shallow checkout omits them).
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # Mandatory for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/rac-connectors

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
